<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/dev-access.js"></script>
    <title>Checkout - ProQ Pilot</title>
    <link rel="stylesheet" href="css/style.css?v=cart-responsive-smart-recs-20260709">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        .address-list { display:flex; flex-direction: column; gap: 10px; }
        .address-card { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); padding: 12px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.25); box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2), inset 0 1px 2px rgba(255, 255, 255, 0.4); display:flex; justify-content:space-between; align-items:center; }
        .address-card .meta { font-size: 0.95rem; color: rgba(255, 255, 255, 0.9); }
        .address-actions { display:flex; gap:8px; }
        .checkout-actions { margin-top: 16px; display:flex; gap:10px; }

        /* Checkout layout helpers */
        .checkout-grid { display: grid; grid-template-columns: 1fr 380px; gap:20px; align-items:start; }
        .address-card { min-width: 0; }
        .address-card .meta.small { font-size: 0.9rem; color: rgba(255, 255, 255, 0.75); margin-top:4px; }

        /* Mobile: stack sections vertically to avoid squeezing */
        @media (max-width: 900px) {
            .checkout-grid { grid-template-columns: 1fr; }
            .address-card { flex-direction: column; align-items: stretch; }
            .address-actions { justify-content: flex-end; flex-wrap: wrap; margin-top:8px; }
            .address-actions .btn { min-width: 120px; }
            .summary-card { margin-top: 14px; }
            .btn { padding: 12px 18px; }
        }

        /* Icon buttons for address actions */
        .btn-icon {
            display:inline-flex; align-items:center; justify-content:center;
            width:40px; height:40px; border-radius:50%; border:1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); cursor:pointer; padding:0; font-size:18px; color:var(--text-main);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2), inset 0 1px 2px rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
        }
        .btn-icon i { line-height: 1; }
        .btn-deliver { border-color: var(--accent-blue); color: var(--accent-blue); }
        .btn-deliver.selected { background: var(--accent-blue); color: #fff; }
        .btn-delete { color: #ff4757; border-color: rgba(255, 71, 87, 0.5); }
        .btn-delete:hover { background: rgba(255, 71, 87, 0.2); }
        .btn-edit { color: var(--accent-blue); }
        .btn-edit:hover { background: rgba(0, 188, 212, 0.2); }
        .btn-icon.btn-outline { background: rgba(255, 255, 255, 0.08); }

        /* Left-side deliver pin and centered view-more */
        .address-card { position: relative; padding: 16px 16px 40px 64px; }
        .deliver-pin { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); }
        .deliver-radio {
            width:18px; height:18px; border-radius:50%; border:2px solid rgba(0,0,0,0.12);
            background: #fff; display:inline-flex; align-items:center; justify-content:center; cursor:pointer;
        }
        .deliver-radio .dot { width:7px; height:7px; border-radius:50%; background: transparent; }
        .deliver-radio.selected { border-color: var(--accent-blue); }
        .deliver-radio.selected .dot { background: var(--accent-blue); }

        .actions-right { display:flex; gap:8px; align-items:center; position:absolute; right:12px; top:50%; transform:translateY(-50%); }

        .view-more {
            position: absolute; left: 50%; transform: translateX(-50%); bottom: 8px;
            background: rgba(0,0,0,0.04); padding:6px 10px; border-radius:12px; font-size:0.95rem; display:inline-flex; align-items:center; gap:6px;
            cursor: pointer; border: 1px solid rgba(0,0,0,0.06);
        }

        @media (max-width: 900px) {
            .address-card { padding-left: 64px; }
            .view-more { bottom: 10px; }
        }

        /* Improved input styles for better UX */
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 10px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2), inset 0 1px 2px rgba(255, 255, 255, 0.4);
            transition: all 0.18s ease-in-out;
            font-size: 0.95rem;
            outline: none;
            color: #ffffff;
        }
        .form-input::placeholder, .form-select::placeholder, .form-textarea::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .form-select option {
            background: #1a1a1a;
            color: #ffffff;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            box-shadow: 0 10px 35px rgba(0, 188, 212, 0.25), inset 0 0 12px rgba(255, 255, 255, 0.2);
            border-color: rgba(0, 188, 212, 0.5);
            background: rgba(255, 255, 255, 0.12);
        }
        .form-textarea { min-height: 80px; resize: vertical; }
        /* Mini summary styles (checkout) */
        .summary-items { display:flex; flex-direction:column; gap:10px; max-height:320px; overflow:auto; }
        .summary-item { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px dashed rgba(255,255,255,0.15); }
        .summary-thumb { width:56px; height:56px; object-fit:cover; border-radius:8px; background:#f4f6f8; flex-shrink:0; }
        .summary-meta { flex:1; min-width:0; }
        .summary-name { font-weight:600; font-size:0.95rem; color:#ffffff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .summary-specs { margin-top:6px; display:flex; gap:6px; flex-wrap:wrap; }
        .spec { background: rgba(255, 255, 255, 0.15); padding:4px 8px; border-radius:8px; font-size:0.75rem; color:rgba(255, 255, 255, 0.9); }
        .summary-qty { font-weight:600; color:#ffffff; margin-left:8px; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo-area">
                <span class="logo-icon" aria-label="ProQ Pilot"></span>
            </div>
            <nav class="nav-links" id="nav-links">
                <a href="index.html">Home</a>
                <a href="store.html">Store</a>


                <a href="user-orders.html">Orders</a>
                <a href="my-account.html">My Account</a>
            </nav>
            <div class="header-actions">
                <a href="wishlist.html" class="wishlist-wrapper">
                    <span class="wishlist-icon"><i class='bx bx-heart'></i></span>
                    <span class="wishlist-badge">0</span>
                </a>
                <a href="signin.html" class="auth-wrapper">
                    <span class="auth-icon"><i class='bx bx-user'></i></span>
                </a>
                <a href="cart.html" class="cart-wrapper">
                    <span class="cart-icon"><i class='bx bx-cart'></i></span>
                    <span class="cart-badge" id="cart-count">0</span>
                </a>
                <div class="hamburger" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </header>

    <main style="max-width:1100px; margin: 140px auto 60px; padding: 0 20px;">
        <h2 style="color: #ffffff;">Choose Delivery Address</h2>
        <p style="color: rgba(255, 255, 255, 0.7);">Select an existing address or add a new one for delivery.</p>

        <div class="checkout-grid" style="margin-top:20px;">
            <section>
                <div id="digitalDeliveryNotice" hidden style="background: rgba(0, 188, 212, 0.15); border: 1px solid var(--accent-blue); padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 30px;">
                    <i class='bx bx-cloud-download' style="font-size: 4rem; color: var(--accent-blue); margin-bottom: 20px; display: block;"></i>
                    <h3 style="color: #ffffff; margin-bottom: 10px;">No Delivery Address Required</h3>
                    <p style="color: rgba(255, 255, 255, 0.8); line-height: 1.6;">
                        Your digital licenses will be activated or delivered electronically after payment.
                    </p>
                </div>

                <div id="addressManager">
                    <div class="address-list" id="addressList">
                        <p style="color: rgba(255, 255, 255, 0.7);">Loading addresses...</p>
                    </div>

                    <h3 style="margin-top:18px; color: #ffffff;">Add New Address</h3>
                    <form id="addressForm">
                        <input class="form-input" name="line1" placeholder="Address line 1" required />
                        <input class="form-input" name="line2" placeholder="Address line 2 (optional)" />
                        <input class="form-input" name="city" placeholder="City" required />
                        <input class="form-input" name="postal_code" placeholder="Postal code" required />
                        <select id="countrySelect" name="country" class="form-select" required>
                            <option value="">Select country</option>
                        </select>
                        <div id="provinceContainer">
                            <input class="form-input" name="province" placeholder="Province/State" />
                        </div>
                        <input class="form-input" name="phone" placeholder="Phone number (e.g. +27 12 345 6789)" />
                        <textarea class="form-textarea" name="delivery_instructions" placeholder="Delivery instructions (e.g. gate code, landmarks)"></textarea>
                        <div style="display:flex; gap:8px; flex-wrap:wrap;">
                            <button class="btn btn-primary" type="submit" id="addressSubmit">Add Address</button>
                            <button type="button" id="cancelAdd" class="btn">Cancel</button>
                            <button type="button" id="cancelEdit" class="btn" style="display:none;">Cancel Edit</button>
                        </div>
                        <p id="addressStatus" role="status" aria-live="polite" style="min-height:24px; margin-top:10px; color:rgba(255,255,255,0.8);"></p>
                    </form>
                </div>
            </section>

            <aside>
                <div class="summary-card" style="background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border: 1px solid rgba(255, 255, 255, 0.25); box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2), inset 0 1px 2px rgba(255, 255, 255, 0.4);">
                    <h3 style="color: #ffffff;">Order Summary</h3>
                    <div id="miniSummary">Loading…</div>
                    <section id="checkoutRecommendations" class="recommendation-slot recommendation-slot--checkout" aria-label="Last-minute useful add-ons"></section>
                    <div class="checkout-actions">
                        <button id="continueToReview" class="btn btn-primary">Continue to Review</button>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <script src="js/recommendations.js?v=smart-package-recs-20260709"></script>
    <script src="js/checkout.js?v=checkout-package-recs-20260709"></script>
    <script src="js/auth-ui.js"></script>
</body>
</html>
