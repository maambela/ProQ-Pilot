<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProQ Pilot | My Wishlist</title>
    <link rel="stylesheet" href="css/style.css?v=cart-responsive-smart-recs-20260709">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo-area">
                <span class="logo-icon" aria-label="ProQ Pilot"></span>
            </div>
            <nav class="nav-links" id="nav-links">
                <a href="index.html">Home</a>
                <a href="store.html">Store</a>
                <a href="user-orders.html">Orders</a>
                <a href="my-account.html">My Account</a>
            </nav>
            <div class="header-actions">
                <a href="wishlist.html" class="wishlist-wrapper">
                    <span class="wishlist-icon"><i class='bx bx-heart'></i></span>
                    <span class="wishlist-badge" id="wishlist-count">0</span>
                </a>
                <a href="signin.html" class="auth-wrapper">
                    <span class="auth-icon"><i class='bx bx-user'></i></span>
                </a>
                <a href="cart.html" class="cart-wrapper">
                    <span class="cart-icon"><i class='bx bx-cart'></i></span>
                    <span class="cart-badge" id="cart-count">0</span>
                </a>
                <div class="hamburger" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </header>

    <main class="wishlist-page">
        <div class="wishlist-page-heading">
            <span>Saved procurement picks</span>
            <h1>My Wishlist</h1>
        </div>
        <div class="cart-layout wishlist-layout">
            <div class="cart-items-wrapper">
                <div id="wishlistItemsList">
                    <div class="empty-wishlist-msg">
                        <i class='bx bx-heart'></i>
                        <h3>Your wishlist is empty</h3>
                        <p>Save procurement picks to compare them later.</p>
                        <a href="store.html" class="btn btn-primary">Continue Shopping</a>
                    </div>
                </div>
            </div>

            <aside class="cart-summary" style="display: none;" id="wishlistSummary">
                <div class="summary-card">
                    <h3>Wishlist Summary</h3>
                    <div class="summary-row">
                        <span>Total Items</span>
                        <span id="wishlist-item-count">0</span>
                    </div>
                    <div class="summary-row">
                        <span>Total Value</span>
                        <span id="wishlist-total-price">R0</span>
                    </div>
                    <hr>
                    <p>Move items to cart when you are ready to buy.</p>
                </div>
            </aside>
        </div>
    </main>

    <footer class="site-footer"></footer>

    <script src="js/site-footer.js?v=footer-mobile-bg-20260708"></script>
    <script src="js/script.js"></script>
    <script src="js/wishlist-logic.js"></script>
    <script src="js/auth-ui.js"></script>
</body>
</html>
