<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProQ Pilot | Development</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/development.css?v=testing-bg-1">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body class="development-page">
    <header class="main-header dev-header">
        <div class="header-container">
            <div class="logo-area">
                <span class="logo-icon">P</span>
                <span class="brand-name">ProQ Pilot</span>
            </div>
            <nav class="nav-links">
                <a href="development.html" class="active">Development</a>
                <a href="signin.html?redirect=index.html">Developer Access</a>
            </nav>

        </div>
    </header>

    <main class="dev-gate">
        <section class="dev-hero">
            <div class="dev-hero-content">
                <span class="badge-pill">Development Access</span>
                <h3>ProQ Pilot is being prepared.</h3>
                <p>
                    Access is limited to the development team while the site is being finalized.
                </p>

                <div class="dev-actions">
                    <a href="signin.html?redirect=index.html" class="btn btn-primary" id="devAccessButton">
                        Developer sign in
                    </a>
                </div>
            </div>
        </section>
    </main>

    <script>
        (function () {
            function hasDeveloperAccess() {
                try {
                    const token = localStorage.getItem('token');
                    const user = JSON.parse(localStorage.getItem('user') || 'null');
                    return Boolean(token && user && user.userID);
                } catch (err) {
                    return false;
                }
            }

            if (hasDeveloperAccess()) {
                const button = document.getElementById('devAccessButton');
                button.href = 'index.html';
                button.textContent = 'Enter development area';
            }
        })();
    </script>
</body>
</html>
