# ProQ Pilot Cloud Run deployment.
# This must stay separate from the existing StackOps website deployment.

substitutions:
  _PROJECT_ID: proq-pilot
  _REGION: us-central1
  _ARTIFACT_REPOSITORY: proq-pilot-repo
  _IMAGE_NAME: proq-pilot
  _SERVICE_NAME: proq-pilot
  _SERVICE_ACCOUNT: proq-pilot-run@proq-pilot.iam.gserviceaccount.com
  _INSTANCE_CONNECTION_NAME: proq-pilot:us-central1:proq-pilot-db

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA

  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --no-invoker-iam-check
      - --service-account
      - ${_SERVICE_ACCOUNT}
      - --add-cloudsql-instances
      - ${_INSTANCE_CONNECTION_NAME}
      - --set-env-vars
      - NODE_ENV=production,INSTANCE_CONNECTION_NAME=${_INSTANCE_CONNECTION_NAME},PAYFAST_MODE=live,PAYFAST_LIVE_URL=https://www.payfast.co.za/eng/process,PAYFAST_SANDBOX_URL=https://sandbox.payfast.co.za/eng/process
      - --set-secrets
      - ACCESS_TOKEN_SECRET=PROQ_ACCESS_TOKEN_SECRET:latest,DB_USER=PROQ_DB_USER:latest,DB_PASSWORD=PROQ_DB_PASSWORD:latest,DB_NAME=PROQ_DB_NAME:latest,AZURE_TENANT_ID=AZURE_TENANT_ID:latest,AZURE_CLIENT_ID=AZURE_CLIENT_ID:latest,AZURE_CLIENT_SECRET=AZURE_CLIENT_SECRET:latest,PAYFAST_MERCHANT_ID=PAYFAST_MERCHANT_ID:latest,PAYFAST_MERCHANT_KEY=PAYFAST_MERCHANT_KEY:latest,PAYFAST_PASSPHRASE=PAYFAST_PASSPHRASE:latest,PAYFAST_RETURN_URL=PAYFAST_RETURN_URL:latest,PAYFAST_CANCEL_URL=PAYFAST_CANCEL_URL:latest,PAYFAST_NOTIFY_URL=PAYFAST_NOTIFY_URL:latest,YOCO_SECRET_KEY=YOCO_SECRET_KEY:latest,TARSON_API_URL=TARSON_API_URL:latest,TARSON_API_TOKEN=TARSON_API_TOKEN:latest,CORE_API_URL=CORE_API_URL:latest,DUO_IKEY=DUO_IKEY:latest,DUO_SKEY=DUO_SKEY:latest,DUO_HOST=DUO_HOST:latest,WESTCON_CLIENT_ID=WESTCON_CLIENT_ID:latest,WESTCON_CLIENT_SECRET=WESTCON_CLIENT_SECRET:latest,WESTCON_RESOURCE_ID=WESTCON_RESOURCE_ID:latest,WESTCON_OAUTH_URL=WESTCON_OAUTH_URL:latest,WESTCON_SUBSCRIPTION_KEY=WESTCON_SUBSCRIPTION_KEY:latest,WESTCON_API_BASE_URL=WESTCON_API_BASE_URL:latest,WESTCON_MICROSOFT_LICENSES_PATH=WESTCON_MICROSOFT_LICENSES_PATH:latest
      - --quiet

timeout: 1600s

images:
  - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
