<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Duo Organizations | ProQ Pilot</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/duo-store.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo-area">
                <span class="logo-icon">P</span>
                <span class="brand-name">ProQ Pilot</span>
            </div>
            <nav class="nav-links" id="nav-links">
                <a href="index.html">Home</a>
                <a href="store.html">Store</a>
                <a href="user-orders.html">Orders</a>
                <a href="my-account.html">My Account</a>
            </nav>
            <div class="header-actions">
                <a href="wishlist.html" class="wishlist-wrapper">
                    <span class="wishlist-icon"><i class='bx bx-heart'></i></span>
                    <span class="wishlist-badge">0</span>
                </a>
                <a href="signin.html" class="auth-wrapper">
                    <span class="auth-icon"><i class='bx bx-user'></i></span>
                </a>
                <a href="cart.html" class="cart-wrapper">
                    <span class="cart-icon"><i class='bx bx-cart'></i></span>
                    <span class="cart-badge" id="cart-count">0</span>
                </a>
                <div class="hamburger" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </header>

    <main style="padding-top: 120px;">
        <div class="duo-main-container">
            <!-- Page Header -->
            <section class="page-header" style="margin-bottom: 60px; text-align: center;">
                <h1 style="font-size: 2.5rem; font-weight: 200; margin-bottom: 12px;">
                    <i class='bx bx-shield' style="color: var(--accent-blue); vertical-align: middle; font-size: 2.8rem;"></i>
                    My Duo Organizations
                </h1>
                <p style="font-size: 1.05rem; color: rgba(255, 255, 255, 0.75); margin-bottom: 30px;">
                    Manage your Cisco Duo Security accounts
                </p>
                <a href="duo-store.html" class="btn btn-primary" style="width: auto; padding: 0.75rem 2rem;">
                    <i class='bx bx-plus'></i> Create New Organization
                </a>
            </section>

            <!-- Organizations Grid -->
            <section id="organizationsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; margin-bottom: 60px;">
                <!-- Organizations loaded here via JavaScript -->
                <div class="placeholder-card" style="grid-column: 1 / -1; text-align: center; padding: 60px 20px;">
                    <i class='bx bx-inbox' style="font-size: 60px; color: rgba(255, 255, 255, 0.2); margin-bottom: 20px; display: block;"></i>
                    <p style="color: rgba(255, 255, 255, 0.6); font-size: 1rem; margin-bottom: 30px;">No organizations yet. Create your first Duo account to get started.</p>
                    <a href="duo-store.html" class="btn btn-primary" style="width: auto; padding: 0.75rem 2rem;">Create Organization</a>
                </div>
            </section>

        </div>
    </main>

    <!-- Modal: Organization Details -->
    <div id="orgModal" class="modal" style="display: none;">
        <div class="modal-content glass-section" style="max-width: 600px; margin: 60px auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h2 id="modalTitle" style="font-size: 1.5rem; font-weight: 200; margin: 0;">Organization Details</h2>
                <button class="modal-close" onclick="closeModal()"style="border: none; background: none; color: var(--accent-blue); font-size: 24px; cursor: pointer;">
                    <i class='bx bx-x'></i>
                </button>
            </div>

            <div id="modalContent">
                <!-- Content loaded here -->
            </div>

            <div style="display: flex; gap: 12px; margin-top: 30px; justify-content: flex-end;">
                <button class="btn secondary-btn" onclick="closeModal()">Close</button>
                <button class="btn btn-primary">Copy Account ID</button>
            </div>
        </div>
    </div>

    <!-- Modal Overlay -->
    <div id="modalOverlay" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.6); z-index: 999;" onclick="closeModal()"></div>

    <footer class="site-footer"></footer>

    <script src="js/site-footer.js"></script>
    <script src="js/auth-ui.js"></script>
    <script>
        class DuoOrgDashboard {
            constructor() {
                this.organizations = [];
                this.userId = this.getCurrentUserId();
                this.init();
            }

            async init() {
                await this.loadOrganizations();
                this.render();
            }

            getCurrentUserId() {
                // Get from localStorage, session, or auth context
                return localStorage.getItem('userId') || '';
            }

            async loadOrganizations() {
                try {
                    const response = await fetch(`/api/duo/organizations?userId=${this.userId}`);
                    if (!response.ok) throw new Error('Failed to load organizations');
                    
                    const data = await response.json();
                    this.organizations = data.organizations || [];
                } catch (error) {
                    console.error('Error loading organizations:', error);
                    this.organizations = [];
                }
            }

            render() {
                const grid = document.getElementById('organizationsGrid');
                
                if (this.organizations.length === 0) {
                    grid.innerHTML = `
                        <div class="placeholder-card" style="grid-column: 1 / -1; text-align: center; padding: 60px 20px;">
                            <i class='bx bx-inbox' style="font-size: 60px; color: rgba(255, 255, 255, 0.2); margin-bottom: 20px; display: block;"></i>
                            <p style="color: rgba(255, 255, 255, 0.6); font-size: 1rem; margin-bottom: 30px;">
                                No organizations yet. Create your first Duo account to get started.
                            </p>
                            <a href="duo-store.html" class="btn btn-primary" style="width: auto; padding: 0.75rem 2rem;">
                                Create Organization
                            </a>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = this.organizations.map(org => `
                    <div class="org-card glass-section" onclick="dashboard.showOrgDetails('${org.id}')">
                        <div class="org-header">
                            <div style="flex: 1;">
                                <h3 style="font-size: 1.2rem; font-weight: 200; margin-bottom: 8px; color: var(--text-main);">
                                    ${this.escape(org.organization_name)}
                                </h3>
                                <div style="display: flex; gap: 12px; margin-bottom: 12px;">
                                    <span class="edition-badge" style="background: rgba(0, 188, 212, 0.2); color: var(--accent-teal); padding: 4px 10px; border-radius: 4px; font-size: 0.75rem;">
                                        ${this.getEditionName(org.edition)}
                                    </span>
                                    <span style="background: rgba(76, 175, 80, 0.2); color: #4caf50; padding: 4px 10px; border-radius: 4px; font-size: 0.75rem;">
                                        Active
                                    </span>
                                </div>
                            </div>
                            <div style="text-align: right;">
                                <i class='bx bx-chevron-right' style="font-size: 24px; color: var(--accent-blue);"></i>
                            </div>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1);">
                            <div>
                                <p style="font-size: 0.85rem; color: rgba(255, 255, 255, 0.6); margin-bottom: 4px;">Licensed Users</p>
                                <p style="font-size: 1.6rem; font-weight: 200; color: var(--sky-blue);">${org.user_limit}</p>
                            </div>
                            <div>
                                <p style="font-size: 0.85rem; color: rgba(255, 255, 255, 0.6); margin-bottom: 4px;">Admins</p>
                                <p style="font-size: 1.6rem; font-weight: 200; color: var(--sky-blue);">${this.parseAdmins(org.admin_emails).length}</p>
                            </div>
                        </div>

                        <p style="font-size: 0.8rem; color: rgba(255, 255, 255, 0.5); margin-top: 15px;">
                            Created ${this.formatDate(org.created_at)}
                        </p>
                    </div>
                `).join('');
            }

            showOrgDetails(orgId) {
                const org = this.organizations.find(o => o.id == orgId);
                if (!org) return;

                const admins = this.parseAdmins(org.admin_emails);
                const content = `
                    <div style="display: grid; gap: 20px;">
                        <div style="padding: 15px; border-radius: 8px; background: rgba(0, 188, 212, 0.1); border: 1px solid rgba(0, 188, 212, 0.2);">
                            <p style="font-size: 0.85rem; color: rgba(255, 255, 255, 0.6); margin-bottom: 8px;">Organization Name</p>
                            <p style="font-size: 1.1rem; font-weight: 200; color: var(--text-main);">
                                ${this.escape(org.organization_name)}
                            </p>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div style="padding: 15px; border-radius: 8px; background: rgba(0, 188, 212, 0.1); border: 1px solid rgba(0, 188, 212, 0.2);">
                                <p style="font-size: 0.85rem; color: rgba(255, 255, 255, 0.6); margin-bottom: 8px;">Edition</p>
                                <p style="font-size: 1.1rem; font-weight: 200; color: var(--sky-blue);">
                                    ${this.getEditionName(org.edition)}
                                </p>
                            </div>
                            <div style="padding: 15px; border-radius: 8px; background: rgba(0, 188, 212, 0.1); border: 1px solid rgba(0, 188, 212, 0.2);">
                                <p style="font-size: 0.85rem; color: rgba(255, 255, 255, 0.6); margin-bottom: 8px;">Licensed Users</p>
                                <p style="font-size: 1.1rem; font-weight: 200; color: var(--sky-blue);">
                                    ${org.user_limit}
                                </p>
                            </div>
                        </div>

                        <div style="padding: 15px; border-radius: 8px; background: rgba(0, 188, 212, 0.1); border: 1px solid rgba(0, 188, 212, 0.2);">
                            <p style="font-size: 0.85rem; color: rgba(255, 255, 255, 0.6); margin-bottom: 8px;">Account ID</p>
                            <p style="font-size: 0.95rem; font-weight: 200; color: var(--text-main); word-break: break-all; font-family: monospace;">
                                ${org.duo_account_id}
                            </p>
                        </div>

                        <div style="padding: 15px; border-radius: 8px; background: rgba(0, 188, 212, 0.1); border: 1px solid rgba(0, 188, 212, 0.2);">
                            <p style="font-size: 0.85rem; color: rgba(255, 255, 255, 0.6); margin-bottom: 12px;">Administrators (${admins.length})</p>
                            <div style="display: flex; flex-direction: column; gap: 8px;">
                                ${admins.map(email => `
                                    <span style="background: rgba(255, 255, 255, 0.1); padding: 8px 12px; border-radius: 6px; font-size: 0.9rem; color: var(--text-main);">
                                        ${this.escape(email)}
                                    </span>
                                `).join('')}
                            </div>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div style="padding: 15px; border-radius: 8px; background: rgba(0, 188, 212, 0.1); border: 1px solid rgba(0, 188, 212, 0.2);">
                                <p style="font-size: 0.85rem; color: rgba(255, 255, 255, 0.6); margin-bottom: 8px;">Status</p>
                                <p style="font-size: 1rem; font-weight: 200; color: #4caf50;">
                                    Active
                                </p>
                            </div>
                            <div style="padding: 15px; border-radius: 8px; background: rgba(0, 188, 212, 0.1); border: 1px solid rgba(0, 188, 212, 0.2);">
                                <p style="font-size: 0.85rem; color: rgba(255, 255, 255, 0.6); margin-bottom: 8px;">Created</p>
                                <p style="font-size: 1rem; font-weight: 200; color: var(--text-main);">
                                    ${this.formatDate(org.created_at)}
                                </p>
                            </div>
                        </div>

                        <div style="padding: 15px; border-radius: 8px; background: rgba(0, 188, 212, 0.1); border: 1px solid rgba(0, 188, 212, 0.2);">
                            <p style="font-size: 0.85rem; color: rgba(255, 255, 255, 0.6); margin-bottom: 12px;">Quick Actions</p>
                            <div style="display: flex; gap: 10px;">
                                <a href="https://admin-${org.api_hostname}" target="_blank" style="flex: 1; padding: 8px 12px; background: rgba(0, 188, 212, 0.2); border: 1px solid var(--accent-blue); border-radius: 6px; color: var(--accent-blue); text-align: center; text-decoration: none; font-size: 0.9rem; transition: all 0.3s ease;">
                                    Go to Duo Console
                                </a>
                            </div>
                        </div>
                    </div>
                `;

                document.getElementById('modalTitle').textContent = org.organization_name;
                document.getElementById('modalContent').innerHTML = content;
                document.getElementById('orgModal').style.display = 'block';
                document.getElementById('modalOverlay').style.display = 'block';
            }

            parseAdmins(adminJson) {
                try {
                    return typeof adminJson === 'string' ? JSON.parse(adminJson) : adminJson || [];
                } catch {
                    return [];
                }
            }

            getEditionName(edition) {
                const names = { 'PLATFORM': 'Advantage', 'ENTERPRISE': 'Enterprise', 'BEYOND': 'Beyond' };
                return names[edition] || edition;
            }

            formatDate(date) {
                return new Date(date).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
            }

            escape(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        function closeModal() {
            document.getElementById('orgModal').style.display = 'none';
            document.getElementById('modalOverlay').style.display = 'none';
        }

        let dashboard;
        document.addEventListener('DOMContentLoaded', () => {
            dashboard = new DuoOrgDashboard();
        });
    </script>

</body>
</html>
