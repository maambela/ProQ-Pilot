<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | ProQ Pilot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <section class="auth-page">
        <div class="auth-card">
            <h2 id="resetTitle">Reset Password</h2>
            <p id="resetDescription">Enter your email to receive reset instructions.</p>

            <form class="auth-form" id="requestResetForm">
                <input type="email" id="resetEmail" placeholder="Email address" autocomplete="email" required>

                <button class="btn btn-primary" type="submit" id="requestResetButton">
                    Send Reset Link
                </button>
            </form>

            <form class="auth-form" id="choosePasswordForm" hidden>
                <input type="password" id="newPassword" placeholder="New password" autocomplete="new-password" minlength="8" required>
                <input type="password" id="confirmNewPassword" placeholder="Confirm new password" autocomplete="new-password" minlength="8" required>

                <button class="btn btn-primary" type="submit" id="savePasswordButton">
                    Save New Password
                </button>
            </form>

            <p id="resetStatus" role="status" aria-live="polite"></p>

            <div class="auth-links">
                <p>
                    <a href="signin.html">Back to sign in</a>
                </p>
            </div>
        </div>
    </section>
    <script>
        const token = new URLSearchParams(window.location.search).get('token');
        const title = document.getElementById('resetTitle');
        const description = document.getElementById('resetDescription');
        const requestForm = document.getElementById('requestResetForm');
        const passwordForm = document.getElementById('choosePasswordForm');
        const status = document.getElementById('resetStatus');

        if (token) {
            title.textContent = 'Choose a New Password';
            description.textContent = 'Enter and confirm your new account password.';
            requestForm.hidden = true;
            passwordForm.hidden = false;
        }

        function setStatus(message, isError = false) {
            status.textContent = message;
            status.style.color = isError ? '#dc2626' : '#16a34a';
        }

        requestForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const button = document.getElementById('requestResetButton');
            button.disabled = true;
            setStatus('Sending reset instructions...');

            try {
                const response = await fetch('/api/v1/users/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('resetEmail').value })
                });
                const result = await response.json();
                setStatus(result.message || 'Check your email for a password reset link.', !response.ok);
            } catch (error) {
                setStatus('Unable to send the reset email. Please try again.', true);
            } finally {
                button.disabled = false;
            }
        });

        passwordForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const password = document.getElementById('newPassword').value;
            const passwordConfirm = document.getElementById('confirmNewPassword').value;
            const button = document.getElementById('savePasswordButton');

            if (password !== passwordConfirm) {
                setStatus('Passwords do not match.', true);
                return;
            }

            button.disabled = true;
            setStatus('Saving your new password...');

            try {
                const response = await fetch(`/api/v1/users/reset-password/${encodeURIComponent(token)}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password, passwordConfirm })
                });
                const result = await response.json();
                setStatus(result.message || 'Your password has been reset.', !response.ok);

                if (response.ok) {
                    passwordForm.reset();
                    setTimeout(() => {
                        window.location.href = 'signin.html';
                    }, 1800);
                }
            } catch (error) {
                setStatus('Unable to reset your password. Please try again.', true);
            } finally {
                button.disabled = false;
            }
        });
    </script>
</body>
</html>
