<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Review Order - ProQ Pilot</title>
    <link rel="stylesheet" href="css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        .review-grid { display: grid; grid-template-columns: 1fr 380px; gap:20px; margin-top:16px; }
        .payment-option:hover { background: rgba(255, 255, 255, 0.12) !important; border-color: rgba(255, 255, 255, 0.4) !important; }
        .payment-option input:checked + span { color: var(--accent-blue); }
        @media (max-width:900px){ .review-grid { grid-template-columns: 1fr; } .summary-card{ margin-top:14px; } }
        .order-item{ display:flex; gap:0; align-items:stretch; padding:0; border-radius:20px; background:transparent; box-shadow:0 10px 30px rgba(0,0,0,0.1); margin-bottom:14px; overflow:hidden; }
        .item-thumb-container{ background:#ffffff; padding:12px; display:flex; align-items:center; justify-content:center; }
        .item-thumb{ width:88px; height:88px; object-fit:contain; border-radius:10px; background:#f4f6f8; flex-shrink:0; }
        .order-item-details{ flex:1; padding:16px; background:rgba(255, 255, 255, 0.08); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); border:1px solid rgba(255, 255, 255, 0.25); box-shadow:inset 0 1px 2px rgba(255, 255, 255, 0.4); }
        .item-meta{ flex:1; min-width:0; }
        .item-name{ font-weight:200; font-size:1.02rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#ffffff; }
        .item-sub{ color:rgba(255, 255, 255, 0.85); margin-top:6px; font-size:0.95rem; }
        .details-panel{ margin-top:8px; padding:10px; background:rgba(255, 255, 255, 0.08); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); border:1px solid rgba(255, 255, 255, 0.2); border-radius:8px; display:none; }
        .gallery-main{ width:100%; max-height:220px; object-fit:contain; border-radius:6px; background:#fff; }
        .gallery-thumbs{ display:flex; gap:8px; margin-top:8px; }
        .thumb-small{ width:56px; height:56px; object-fit:cover; border-radius:6px; cursor:pointer; border: 2px solid transparent; transition: all 0.3s ease; }
        .thumb-small:hover{ border-color: var(--accent-blue); }
        .view-toggle{ display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:12px; background:rgba(255, 255, 255, 0.15); cursor:pointer; border:1px solid rgba(255, 255, 255, 0.25); color:#ffffff; transition:all 0.3s ease; backdrop-filter:blur(10px); }
        .test-duo-btn{ display:inline-flex; align-items:center; gap:8px; padding:10px 16px; border-radius:12px; background:rgba(0, 188, 212, 0.2); border:2px solid var(--accent-blue); color:var(--accent-blue); cursor:pointer; font-weight:200; transition:all 0.3s ease; backdrop-filter:blur(10px); margin-top:12px; }
        .test-duo-btn:hover{ background:rgba(0, 188, 212, 0.4); transform:translateY(-2px); box-shadow:0 8px 20px rgba(0, 188, 212, 0.3); }
        .test-duo-btn:active{ transform:translateY(0); }
        .test-duo-btn.loading{ opacity:0.7; pointer-events:none; }
        .test-duo-btn.loading::after{ content:''; display:inline-block; width:14px; height:14px; border:2px solid transparent; border-top-color:var(--accent-blue); border-radius:50%; animation:spin 0.8s linear infinite; margin-left:4px; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .test-result-container{ margin-top:20px; padding:16px; background:rgba(0, 188, 212, 0.1); border:2px solid var(--accent-blue); border-radius:12px; backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); display:none; }
        .test-result-container.show{ display:block; }
        .test-result-status{ font-size:0.9rem; font-weight:200; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
        .test-result-status.success{ color:#4ade80; }
        .test-result-status.error{ color:#ff6b6b; }
        .test-result-accounts{ display:grid; gap:8px; }
        .account-item{ background:rgba(255, 255, 255, 0.08); padding:12px; border-radius:8px; border-left:3px solid var(--accent-blue); color:rgba(255, 255, 255, 0.9); font-size:0.9rem; }
        .account-item-field{ display:flex; justify-content:space-between; margin:4px 0; }
        .account-item-label{ font-weight:200; color:rgba(255, 255, 255, 0.7); }
        .account-item-value{ color:#ffffff; word-break:break-all; }
        .test-result-error{ background:rgba(255, 107, 107, 0.1); border:1px solid rgba(255, 107, 107, 0.3); padding:12px; border-radius:8px; color:#ff6b6b; font-size:0.9rem; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo-area">
                <span class="logo-icon">P</span>
                <span class="brand-name">ProQ Pilot</span>
            </div>
            <nav class="nav-links" id="nav-links">
                <a href="index.html">Home</a>
                <a href="store.html">Store</a>
                <a href="https://stackopsit.co.za" class="it-services-link" target="_blank" rel="noopener"><i class='bx bx-shield-quarter'></i>IT Services</a>
                <a href="user-orders.html">Orders</a>
                <a href="my-account.html">My Account</a>
            </nav>
            <div class="header-actions">
                <a href="wishlist.html" class="wishlist-wrapper">
                    <span class="wishlist-icon"><i class='bx bx-heart'></i></span>
                    <span class="wishlist-badge">0</span>
                </a>
                <a href="signin.html" class="auth-wrapper">
                    <span class="auth-icon"><i class='bx bx-user'></i></span>
                </a>
                <a href="cart.html" class="cart-wrapper">
                    <span class="cart-icon"><i class='bx bx-cart'></i></span>
                    <span class="cart-badge" id="cart-count">0</span>
                </a>
                <div class="hamburger" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </header>

    <main style="max-width:1100px; margin:140px auto;">
        <h2 style="color:#ffffff;">Review & Complete</h2>
        <div class="review-grid">
            <section>
                <div id="selectedAddressCard" style="margin-bottom:12px;"></div>
                <h3 style="color:#ffffff;">Items</h3>
                <div id="orderItems"></div>
                <button id="testDuoBtn" class="test-duo-btn" style="display:none;"><i class='bx bx-play-circle'></i>Test DUO API</button>
                <div id="testResultContainer" class="test-result-container"></div>
                <div style="margin-top:12px;"><button id="editAddress" class="btn">Edit address</button></div>
            </section>

            <aside>
                <div class="summary-card" style="background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border: 1px solid rgba(255, 255, 255, 0.25); box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2), inset 0 1px 2px rgba(255, 255, 255, 0.4);">
                    <h3 style="color:#ffffff;">Payment & Summary</h3>
                    <div id="summaryDetails"></div>
                    
                    <div style="margin-top:20px;">
                        <h4 style="margin-bottom:10px; color:#ffffff;">Select Payment Method</h4>
                        <div class="payment-options" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;">
                            <label class="payment-option" style="display: flex; align-items: center; gap: 10px; padding: 12px; border: 1px solid rgba(255, 255, 255, 0.25); border-radius: 8px; cursor: pointer; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); transition: all 0.3s ease;">
                                <input type="radio" name="paymentMethod" value="payfast" checked style="cursor:pointer;">
                                <span style="color:#ffffff;"><strong>PayFast</strong> (Instant EFT, Credit Card)</span>
                                <img src="https://chuwi-sa.co.za/wp-content/uploads/2021/10/payfast.png?w=860&h=266&rs=1&pid=ImgDetMain&o=7&rm=3" alt="PayFast" style="height: 30px; margin-left: auto;">
                            </label>
                            <label class="payment-option" style="display: flex; align-items: center; gap: 10px; padding: 12px; border: 1px solid rgba(255, 255, 255, 0.25); border-radius: 8px; cursor: pointer; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); transition: all 0.3s ease;">
                                <input type="radio" name="paymentMethod" value="yoco" style="cursor:pointer;">
                                <span style="color:#ffffff;"><strong>Yoco</strong> (Card Payments)</span>
                                <img src="https://yoco.co.bw/assets/yoco_logo_blue-DRrYCuck.png?rik=l%2fcuqY29BdIP8Q&pid=ImgRaw&r=0" alt="Yoco" style="height: 15px; margin-left: auto;">
                            </label>
                            <label class="payment-option" style="display: flex; align-items: center; gap: 10px; padding: 12px; border: 1px solid rgba(255, 255, 255, 0.25); border-radius: 8px; cursor: pointer; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); transition: all 0.3s ease;">
                                <input type="radio" name="paymentMethod" value="stitch" style="cursor:pointer;">
                                <span style="color:#ffffff;"><strong>Pay by Bank</strong> (Stitch Express)</span>
                            </label>
                        </div>
                    </div>

                    <div style="margin-top:12px; display:flex; gap:8px;"><button id="payBtn" class="btn btn-primary" style="width: 100%;">Pay Now</button></div>
               
                                    <!-- New secure checkout message below the summary -->
                    <div class="secure-checkout" style="margin-top:16px; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); padding: 16px; border-radius: 12px; text-align: left; border: 1px solid rgba(255, 255, 255, 0.25); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2), inset 0 1px 2px rgba(255, 255, 255, 0.4);">
                        <div class="secure-item"><i class='bx bx-lock'></i><span>Secure Checkout</span></div>
                        <div class="secure-item"><i class='bx bx-credit-card'></i><span>Many ways to pay</span></div>
                        <div class="secure-item"><i class='bx bxs-truck'></i><span>Fast, reliable delivery</span></div>
                        <div class="payment-icons" style="margin-top:10px; display: flex; justify-content: left; gap:10px; align-items:center;">
                            <img src="https://img.icons8.com/color/48/000000/visa.png" alt="Visa" style="width:32px; height:auto;">
                            <img src="https://img.icons8.com/color/48/000000/mastercard-logo.png" alt="MasterCard" style="width:32px; height:auto;">
                            <img src="https://img.icons8.com/color/48/000000/paypal.png" alt="PayPal" style="width:32px; height:auto;">
                            <img src="https://img.icons8.com/color/48/000000/google-pay-india.png" alt="Google Pay" style="width:32px; height:auto;">
                            <img src="https://img.icons8.com/color/48/000000/apple-pay.png" alt="Apple Pay" style="width:32px; height:auto;">
                    </div>
                </div>
                </div>
            
            
            </aside>
        </div>
    </main>
    <!-- Product details modal -->
    <div id="productModal" class="modal-overlay" aria-hidden="true">
        <div class="product-modal">
            <button id="modalClose" class="modal-close">&times;</button>
            <div class="modal-body">
                <div class="modal-left">
                    <div id="modalGallery" class="modal-gallery"></div>
                </div>
                <div class="modal-right">
                    <h3 id="modalTitle">Product</h3>
                    <div id="modalSpecs" class="modal-specs"></div>
                    <div id="modalDescription" class="modal-description" style="margin-top:12px;color:#333"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer"></footer>

    <script src="js/site-footer.js"></script>
    <script src="js/auth-ui.js"></script>
    <script src="js/review.js"></script>
</body>
</html>
